rules:
  - name: "Refrigerant Leak"
    conditions:
      - feature: "pressure"
        agg: "min"
        operator: "<"
        value: 90
      - feature: "temperature"
        agg: "min"
        operator: "<"
        value: 10
    confidence: 90.0
    severity: "Critical"
    likely_root_cause: "Punctured line or loose fitting"
    downtime_risk: "High"
    etf: "1-3 days"
    actions: "Inspect lines for leaks and recharge refrigerant immediately."
    downtime_cost: "$20,000"
    repair_cost: "$5,000"
    total_risk: "$25,000"

  - name: "Motor Overload"
    conditions:
      - feature: "temperature"
        agg: "max"
        operator: ">"
        value: 30
      - feature: "current"
        agg: "max"
        operator: ">"
        value: 20
    confidence: 88.0
    severity: "Critical"
    likely_root_cause: "Mechanical binding or power surge"
    downtime_risk: "High"
    etf: "0-1 days"
    actions: "Shut down motor, inspect for binding, and check power supply."
    downtime_cost: "$100,000"
    repair_cost: "$15,000"
    total_risk: "$115,000"

  - name: "Bearing Failure"
    conditions:
      - feature: "vibration"
        agg: "max"
        operator: ">"
        value: 1.5
      - feature: "current"
        agg: "max"
        operator: ">"
        value: 20
    confidence: 92.0
    severity: "High"
    likely_root_cause: "Lack of lubrication or normal wear"
    downtime_risk: "Medium"
    etf: "2-5 days"
    actions: "Schedule immediate replacement of motor bearings."
    downtime_cost: "$80,000"
    repair_cost: "$8,000"
    total_risk: "$88,000"

  - name: "Scroll Valve Leak"
    conditions:
      - feature: "temperature"
        agg: "max"
        operator: ">"
        value: 30
      - feature: "vibration"
        agg: "max"
        operator: ">"
        value: 1.5
    confidence: 85.0
    severity: "Medium"
    likely_root_cause: "Seal degradation"
    downtime_risk: "Low"
    etf: "7-14 days"
    actions: "Inspect scroll valve seals and plan for replacement during next maintenance window."
    downtime_cost: "$50,000"
    repair_cost: "$10,000"
    total_risk: "$60,000"
