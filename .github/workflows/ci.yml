name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        playwright install chromium
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Check format with Ruff
      run: |
        ruff format --check .
        
    - name: Run Tests
      run: |
        PYTHONPATH=src pytest tests/
